name: ChemiCheck
options:
  bundleIdPrefix: com.medix
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  ChemiCheck:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ChemiCheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.medix.chemicheck
        PRODUCT_NAME: 케미체크
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: ChemiCheck/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: minimal
        ENABLE_PREVIEW: YES
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: Vision.framework
      - sdk: UserNotifications.framework
      - sdk: CoreLocation.framework
